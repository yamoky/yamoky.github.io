<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil Adjoint - Codes Caisse</title>
    <!-- Chargement de l'outil pour lire le Google Sheets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --lidl-blue: #0050AA;
            --lidl-yellow: #FFF000;
            --lidl-red: #E3000F;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }
        h1 { color: var(--lidl-blue); margin: 0 0 5px 0; font-size: 24px; }
        .subtitle { margin:0; color:#555; font-size: 14px; }
        
        .search-container {
            width: 100%;
            max-width: 500px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        #searchInput {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 3px solid var(--lidl-blue);
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #searchInput:focus { border-color: var(--lidl-red); }
        
        .results {
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .product-card {
            background: white;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            border-left: 6px solid var(--lidl-yellow);
            gap: 15px;
        }
        .product-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 5px;
            background-color: #f0f0f0;
            display: none; /* Masqué par défaut si pas d'image */
        }
        .product-info { flex-grow: 1; }
        .product-info h2 { margin: 0 0 4px 0; font-size: 16px; color: #333; }
        .product-info p { margin: 0; font-size: 13px; color: #666; }
        .product-code {
            font-size: 22px;
            font-weight: bold;
            color: var(--lidl-red);
            background: #fff00033;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
        }
        #loadingMsg { color: var(--lidl-blue); font-weight: bold; margin-top: 20px;}
    </style>
</head>
<body>

    <div class="header">
        <h1>🔍 Recherche Rapide</h1>
        <p class="subtitle">Outil Adjoint - Libourne | Base de données en direct</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Nom ou code (ex: vinaigrette, 4011)..." autocomplete="off" disabled>
    </div>

    <div id="loadingMsg">Chargement des produits depuis le tableau...</div>

    <div class="results" id="resultsContainer"></div>

    <script>
        // Le lien Google Sheets final
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT56JGZq3oA4aACqPaa8C3jOTBzW6SVrNkco-ae3efnfuyjW2k4R_np_nAMLRcQrqD8IL5CSwGOLuyZ/pub?output=csv';
        
        let products = [];
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const loadingMsg = document.getElementById('loadingMsg');

        // Récupération des données depuis Google Sheets
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                products = results.data;
                loadingMsg.style.display = 'none'; // Cache le message de chargement
                searchInput.disabled = false; // Active la barre de recherche
                searchInput.focus();
                displayProducts(products); // Affiche tout au début
            },
            error: function(error) {
                loadingMsg.textContent = "Erreur de chargement. Vérifie le lien Google Sheets.";
                loadingMsg.style.color = "red";
            }
        });

        // Fonction d'affichage des cartes
        function displayProducts(filteredProducts) {
            resultsContainer.innerHTML = '';
            
            if (filteredProducts.length === 0) {
                resultsContainer.innerHTML = '<p style="text-align:center; color:#888;">Aucun produit trouvé.</p>';
                return;
            }

            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                // Gestion de l'image (affiche uniquement si un lien est présent dans le tableau)
                let imgHTML = '';
                if(product.Image && product.Image.trim() !== "") {
                    imgHTML = `<img src="${product.Image}" class="product-img" style="display:block;" alt="${product.Nom}">`;
                }

                card.innerHTML = `
                    ${imgHTML}
                    <div class="product-info">
                        <h2>${product.Nom || 'Sans nom'}</h2>
                        <p>${product.Type || 'Code'}</p>
                    </div>
                    <div class="product-code">
                        ${product.Code || 'N/A'}
                    </div>
                `;
                resultsContainer.appendChild(card);
            });
        }

        // Recherche en temps réel
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            const filtered = products.filter(product => {
                const nom = (product.Nom || '').toLowerCase();
                const code = (product.Code || '').toLowerCase();
                return nom.includes(searchTerm) || code.includes(searchTerm);
            });
            displayProducts(filtered);
        });
    </script>
</body>
</html>
